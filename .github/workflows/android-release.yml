name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*' # Trigger workflow on version tags like v1.0.0

permissions:
  contents: write # Needed to create GitHub Releases

jobs:
  build-android:
    name: Build Android native APK locally
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: ⚙️ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Execute Expo Prebuild
        run: npx expo prebuild --platform android --clean

      - name: 🔨 Compile APK (Assemble Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: 🏷️ Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk Arknights-Gacha-Helper-${{ github.ref_name }}.apk

      - name: 🚀 Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Arknights-Gacha-Helper-${{ github.ref_name }}.apk
          generate_release_notes: true
          name: Release ${{ github.ref_name }}
